<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERN Class</title>
    <!--<link rel="stylesheet" href="styles.css">-->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: rgb(247, 244, 244);
        }
        h1 {
            color: #333;
        }
        form {
            margin-top: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input {
            padding: 8px;
            width: 300px;
            margin-top: 5px;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    
    <h1>Welcome to MERN Class</h1>
    <p>This is a simple MERN stack login application.</p>
    <form id= "form">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" pattern="[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.com$" required>
        <label for="Country">Country:</label>
        <input type="text" id="Country" name="Country" required>
        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" 
           pattern="[0-9]{10}" 
           maxlength="10" 
           placeholder="Enter 10 digit number"
           required>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <div id="password-strength"></div>
        <br><br>
        <button type="submit">Submit</button>
    </form>
    <script>
        document.getElementById('email').addEventListener('blur', function() {
            const pattern = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.com$/;
            if (!pattern.test(this.value)) {
                this.setCustomValidity('Email must contain @ and end with .com');
            } else {
                this.setCustomValidity('');
            }
            this.reportValidity();
        });
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            let score = 0;
            if (password.length >= 8) score++;
            if (/[a-z]/.test(password)) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^a-zA-Z0-9]/.test(password)) score++;
            const strengthDiv = document.getElementById('password-strength');
            if (score <= 2) {
                strengthDiv.textContent = 'Weak';
                strengthDiv.style.color = 'red';
            } else if (score <= 4) {
                strengthDiv.textContent = 'Medium';
                strengthDiv.style.color = 'orange';
            } else {
                strengthDiv.textContent = 'Strong';
                strengthDiv.style.color = 'green';
            }
        });
    </script>
</body>
</html>
